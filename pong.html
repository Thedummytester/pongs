<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:Arial,sans-serif;}
.container{text-align:center;}
h1{color:white;margin-bottom:20px;}
#gameCanvas{background:#1a1a2e;border:3px solid white;display:block;margin:0 auto 20px;cursor:none;}
.scoreboard{display:flex;justify-content:space-around;width:800px;margin:0 auto 20px;color:white;font-size:24px;font-weight:bold;}
.score-item{flex:1;padding:10px;}
.player-score{text-align:left;}
.computer-score{text-align:right;}
.instructions{color:white;margin-top:20px;font-size:14px;max-width:800px;line-height:1.6;}
.button-group{margin-top:10px;}
button{background:#667eea;color:white;border:none;padding:10px 20px;margin:5px;font-size:16px;border-radius:5px;cursor:pointer;}
button:hover{background:#764ba2;}
.game-over{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);padding:40px;border-radius:10px;color:white;text-align:center;z-index:1000;}
.game-over h2{font-size:36px;margin-bottom:20px;}
</style>
</head>

<body>

<div class="container">
<h1>🎮 PONG GAME 🎮</h1>

<div class="scoreboard">
<div class="score-item player-score">Player: <span id="playerScore">0</span></div>
<div class="score-item computer-score">Computer: <span id="computerScore">0</span></div>
</div>

<div class="button-group">
<button onclick="setDifficulty('easy')">Easy</button>
<button onclick="setDifficulty('medium')">Medium</button>
<button onclick="setDifficulty('hard')">Hard</button>
</div>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<div class="instructions">
<p><strong>Controls:</strong></p>
<p>🖱 Move mouse up/down to move paddle</p>
<p>⬆️⬇️ Or use arrow keys</p>
<p>First to 5 points wins</p>
</div>

<div class="button-group">
<button onclick="location.reload()">New Game</button>
<button onclick="togglePause()">Pause</button>
</div>
</div>

<div class="game-over" id="gameOverModal">
<h2>Game Over</h2>
<p id="gameOverMessage"></p>
<button onclick="location.reload()">Play Again</button>
</div>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

const paddleWidth=10;
const paddleHeight=80;
const ballSize=8;
const ballSpeed=5;
const paddleSpeed=6;

let difficulty="medium";
let aiSpeed=0.8;
let aiReaction=35;

function setDifficulty(level){
 difficulty=level;
 if(level==="easy"){aiSpeed=0.4;aiReaction=80;}
 if(level==="medium"){aiSpeed=0.8;aiReaction=35;}
 if(level==="hard"){aiSpeed=1.4;aiReaction=10;}
}

const player={x:10,y:canvas.height/2-paddleHeight/2,width:paddleWidth,height:paddleHeight,score:0};
const computer={x:canvas.width-paddleWidth-10,y:canvas.height/2-paddleHeight/2,width:paddleWidth,height:paddleHeight,score:0};

const ball={x:canvas.width/2,y:canvas.height/2,size:ballSize,dx:ballSpeed,dy:ballSpeed};

let mouseY=canvas.height/2;
let keys={};
let isPaused=false;
const winScore=5;

canvas.addEventListener("mousemove",e=>{
 const rect=canvas.getBoundingClientRect();
 mouseY=e.clientY-rect.top;
});

document.addEventListener("keydown",e=>{keys[e.key]=true;});
document.addEventListener("keyup",e=>{keys[e.key]=false;});

function togglePause(){isPaused=!isPaused;}

function updatePlayer(){
 player.y=Math.max(0,Math.min(mouseY-paddleHeight/2,canvas.height-paddleHeight));
 if(keys["ArrowUp"]) player.y=Math.max(0,player.y-paddleSpeed);
 if(keys["ArrowDown"]) player.y=Math.min(canvas.height-paddleHeight,player.y+paddleSpeed);
}

function updateComputer(){
 const center=computer.y+paddleHeight/2;
 const ballCenter=ball.y;
 if(center<ballCenter-aiReaction){computer.y=Math.min(canvas.height-paddleHeight,computer.y+paddleSpeed*aiSpeed);} 
 else if(center>ballCenter+aiReaction){computer.y=Math.max(0,computer.y-paddleSpeed*aiSpeed);} 
}

function updateBall(){
 ball.x+=ball.dx;
 ball.y+=ball.dy;

 if(ball.y-ball.size<0||ball.y+ball.size>canvas.height) ball.dy=-ball.dy;

 if(ball.x-ball.size<player.x+player.width && ball.y>player.y && ball.y<player.y+player.height){
  ball.dx=-ball.dx;
  ball.x=player.x+player.width+ball.size;
 }

 if(ball.x+ball.size>computer.x && ball.y>computer.y && ball.y<computer.y+computer.height){
  ball.dx=-ball.dx;
  ball.x=computer.x-ball.size;
 }

 if(ball.x<0){computer.score++;resetBall();}
 if(ball.x>canvas.width){player.score++;resetBall();}
}

function resetBall(){
 ball.x=canvas.width/2;
 ball.y=canvas.height/2;
 ball.dx=ballSpeed*(Math.random()>0.5?1:-1);
 ball.dy=ballSpeed*(Math.random()*2-1);
}

function draw(){
 ctx.fillStyle="#1a1a2e";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.strokeStyle="rgba(255,255,255,0.3)";
 ctx.setLineDash([5,5]);
 ctx.beginPath();
 ctx.moveTo(canvas.width/2,0);
 ctx.lineTo(canvas.width/2,canvas.height);
 ctx.stroke();
 ctx.setLineDash([]);

 ctx.fillStyle="#00ff00";
 ctx.fillRect(player.x,player.y,player.width,player.height);
 ctx.fillRect(computer.x,computer.y,computer.width,computer.height);

 ctx.fillStyle="#ff00ff";
 ctx.beginPath();
 ctx.arc(ball.x,ball.y,ball.size,0,Math.PI*2);
 ctx.fill();

 document.getElementById("playerScore").textContent=player.score;
 document.getElementById("computerScore").textContent=computer.score;

 if(player.score>=winScore) endGame("You Win 🎉");
 if(computer.score>=winScore) endGame("Computer Wins 🤖");
}

function endGame(message){
 document.getElementById("gameOverMessage").textContent=message;
 document.getElementById("gameOverModal").style.display="block";
 isPaused=true;
}

function update(){if(!isPaused){updatePlayer();updateComputer();updateBall();}}

function gameLoop(){update();draw();requestAnimationFrame(gameLoop);} 

setDifficulty("medium");

gameLoop();
</script>

</body>
</html>
